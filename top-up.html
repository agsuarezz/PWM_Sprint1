<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recargar - Banco Imperium</title>

    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/operations-style.css">
</head>
<body data-page="top-up">

    <div id="header-profile" xlu-include-file="templates/header-profile.html"></div>

    <main class="transfer-page-wrapper">
        <div class="transfer-card">
            <form id="formulario-operacion">
                <div class="transfer-body">
                    <div id="operation-title" xlu-include-file="templates/operation-title.html"></div>

                    <div class="transfer-flex-row" id="field-operator" xlu-include-file="templates/field-template.html" data-validation="required"></div>

                    <div class="transfer-flex-row" id="field-phone" xlu-include-file="templates/field-template.html" data-validation="required pattern='[0-9]{9}' title='Debe contener 9 números'"></div>

                    <div class="transfer-flex-row" id="field-amount" xlu-include-file="templates/field-template.html" data-validation="required max='100'"></div>
                </div>

                <div class="transfer-footer">
                    <div class="footer-left">
                        <div id="button-clear" xlu-include-file="templates/button.html"></div>
                    </div>

                    <div class="footer-right">
                        <div id="button-cancel" xlu-include-file="templates/button.html"></div>
                        <div id="button-action" xlu-include-file="templates/button.html"></div>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <div xlu-include-file="templates/footer.html"></div>

    <script src="script.js"></script>
    <script src="operations.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            xLuIncludeFile().then(() => {
                document.dispatchEvent(new CustomEvent('templatesReady'));
            });
        });
    </script>
</body>
</html>
