<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil de Usuario</title>

    <link rel="stylesheet" href="styles/shared.css"> 
    <link rel="stylesheet" href="styles/profile-style.css">
</head>
<body data-page="profile">

    <div id="header-profile" xlu-include-file="templates/header-profile.html"></div>

    <main class="perfil-fondo-general">
        <div class="perfil-tarjeta-dos-columnas">
            
            <aside class="perfil-columna-izquierda">
                <div id="profile-image" xlu-include-file="templates/profile-image.html"></div>
            </aside>

            <section class="perfil-columna-derecha">
                <div id="profile-name-block" xlu-include-file="templates/profile-name.html"></div>

                <div id="profile-email" xlu-include-file="templates/profile-field-text.html"></div>

                <div id="profile-password" xlu-include-file="templates/profile-field-text.html"></div>

                <div id="profile-phone" xlu-include-file="templates/profile-field-text.html"></div>

                <div id="profile-address" xlu-include-file="templates/profile-field-text.html"></div>

                <div id="profile-delete-button" xlu-include-file="templates/button.html"></div>
            </section>

        </div>
    </main>

    <div xlu-include-file="templates/footer.html"></div>

    <script src="script.js"></script>
    <script src="profile.js"></script>
</body>
</html>
