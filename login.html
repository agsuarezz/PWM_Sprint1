<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Banco Imperium</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/login-style.css">
    <link rel="stylesheet" href="styles/responsive-pages.css">
</head>
<body data-page="login">

    <header id="profile-header" xlu-include-file="templates/header-profile.html"></header>

    <main class="login-page-wrapper">
        <div class="login-main-container">
            <div class="login-content-section">
                
                <div class="login-image-column">
                    <div id="login-visual" xlu-include-file="templates/services-image.html"></div>
                </div>

                <div class="login-form-column">
                    <div id="login-text-content" class="login-form-card">
                        
                        <h1 class="login-title">{{title}}</h1>
                        <p class="login-subtitle">{{subtitle}}</p>

                        <form id="login-form">
                            <div class="form-group">
                                <label for="usuario">{{label_user}}</label>
                                <input type="text" id="usuario" name="usuario" placeholder="{{placeholder_user}}" required>
                            </div>

                            <div class="form-group">
                                <label for="password">{{label_pass}}</label>
                                <div class="password-wrapper">
                                    <input type="password" id="password" name="password" placeholder="" required>
                                    
                                    <span id="password-icon-container" class="eye-icon" xlu-include-file="templates/icon-eye.html"></span>
                                </div>
                            </div>
                            
                            <div id="login-submit-container" xlu-include-file="templates/button-submit.html"></div>

                            <div class="login-links">
                                <a href="#">{{link_forgot}}</a>
                                <a href="register.html">{{link_signup}}</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <footer id="main-footer" xlu-include-file="templates/footer.html"></footer>

    <script src="login.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", xLuIncludeFile);
    </script>
</body>
</html>
