<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión - Banco Imperium</title>
    
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/login-style.css">
</head>
<body data-page="login">

    <div id="login-header" xlu-include-file="templates/header-profile.html"></div>

    <main class="login-page-wrapper">
        <div class="login-main-container">
            <div class="login-content-section">
                
                <div class="login-image-column">
                    <div id="login-visual" xlu-include-file="templates/services-image.html"></div>
                </div>

                <div class="login-form-column">
                    <div class="login-form-card">
                        
                        <h1 class="login-title">Te damos la bienvenida</h1>
                        <p class="login-subtitle">Hola, introduce tu usuario y clave de acceso para continuar.</p>

                        <form id="login-form">
                            <div class="form-group">
                                <label for="usuario">Usuario</label>
                                <input type="text" id="usuario" name="usuario" placeholder="NIF, NIE, Pasaporte o Tarjeta Anónima" required>
                            </div>

                            <div class="form-group">
                                <label for="password">Contraseña</label>
                                <div class="password-wrapper">
                                    <input type="password" id="password" name="password" placeholder="" required>
                                    
                                    <span id="password-icon-container" class="eye-icon" xlu-include-file="templates/icon-eye.html"></span>
                                </div>
                            </div>
                            
                            <div id="login-submit-container" xlu-include-file="templates/button-submit.html"></div>

                            <div class="login-links">
                                <a href="#">¿Olvidó la contraseña?</a>
                                <a href="#">¿No eres cliente?</a>
                            </div>
                        </form>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <div xlu-include-file="templates/footer.html"></div>

    <script src="script.js"></script>
    <script src="login.js"></script>
    <script>
        // Lanzamos la función principal al cargar el DOM
        document.addEventListener("DOMContentLoaded", xLuIncludeFile);
    </script>
</body>
</html>
