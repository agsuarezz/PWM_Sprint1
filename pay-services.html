<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagar Servicios - Banco Imperium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/shared.css">
<link rel="stylesheet" href="styles/operations-style.css">
<link rel="stylesheet" href="styles/responsive-pages.css">

</head>

<body data-page="pay-services">

<header id="profile-header" xlu-include-file="templates/header-profile.html"></header>

<main class="transfer-page-wrapper">
<div class="transfer-card">

<form id="formulario-operacion">

<div class="transfer-body">

<div id="operation-title" xlu-include-file="templates/operation-title.html"></div>

<div class="transfer-flex-row"
     id="field-service"
     xlu-include-file="templates/field-template.html"
     data-validation="required">
</div>

<div class="transfer-flex-row"
     id="field-reference"
     xlu-include-file="templates/field-template.html"
     data-validation="required pattern='[0-9]{10,20}' title='De 10 a 20 números'">
</div>

<div class="transfer-flex-row"
     id="field-amount"
     xlu-include-file="templates/field-template.html"
     data-validation="required min='0.01' step='0.01'">
</div>

<div class="transfer-flex-row"
     id="field-concept"
     xlu-include-file="templates/field-template.html">
</div>

</div>

<div class="transfer-footer">

<div class="footer-left">
<div id="button-clear"
     xlu-include-file="templates/button.html">
</div>
</div>

<div class="footer-right">

<div id="button-cancel"
     xlu-include-file="templates/button.html">
</div>

<div id="button-action"
     xlu-include-file="templates/button.html">
</div>

</div>

</div>

</form>

</div>
</main>

<footer id="main-footer" xlu-include-file="templates/footer.html"></footer>

<script src="script.js"></script>
<script src="operations.js"></script>
<script>
        document.addEventListener("DOMContentLoaded", () => {
            xLuIncludeFile().then(() => {
                document.dispatchEvent(new CustomEvent('templatesReady'));
            });
        });
</script>

</body>
</html>
