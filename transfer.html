<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transferencia - Banco Imperium</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles/shared.css">
<link rel="stylesheet" href="styles/operations-style.css">
<link rel="stylesheet" href="styles/responsive-pages.css">
</head>

<body data-page="transfer">

<header id="profile-header" xlu-include-file="templates/header-profile.html"></header>

<main class="transfer-page-wrapper">
    <div class="transfer-card">
        <form id="formulario-operacion">

            <div class="transfer-body">

                <div id="titulo-operacion" xlu-include-file="templates/operation-title.html"></div>

                <div class="transfer-flex-row" id="field-nombre" xlu-include-file="templates/field-template.html" data-validation="required pattern='[a-zA-ZÁ-Úá-úÑñ ]+' title='Solo letras'"></div>

                <div class="transfer-flex-row" id="field-iban" xlu-include-file="templates/field-template.html" data-validation="required pattern='[A-Z]{2}[0-9]{22}' title='ES seguido de 22 números'"></div>

                <div class="transfer-flex-row" id="field-importe" xlu-include-file="templates/field-template.html" data-validation="required min='0.01' step='0.01'"></div>

                <div class="transfer-flex-row" id="field-concepto" xlu-include-file="templates/field-template.html" data-validation="required"></div>

            </div>

            <div class="transfer-footer">
                <div class="footer-left">
                    <div id="btn-borrar" xlu-include-file="templates/button.html"></div>
                </div>

                <div class="footer-right">
                    <div id="btn-cancelar" xlu-include-file="templates/button.html"></div>
                    <div id="btn-accion" xlu-include-file="templates/button.html"></div>
                </div>
            </div>

        </form>
    </div>
</main>

<footer id="main-footer" xlu-include-file="templates/footer.html"></footer>

<script src="script.js"></script>
<script src="operations.js"></script>
<script src="dashboard.js"></script>
<script>
        document.addEventListener("DOMContentLoaded", () => {
            xLuIncludeFile().then(() => {
                document.dispatchEvent(new CustomEvent('templatesReady'));
            });
        });
    </script>

</body>
</html>
