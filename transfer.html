<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transferencia - Banco Imperium</title>

<link rel="stylesheet" href="styles/shared.css">
<link rel="stylesheet" href="styles/operations-style.css">
</head>

<body data-page="transfer">

<div id="header-profile" xlu-include-file="templates/header-profile.html"></div>

<main class="transfer-page-wrapper">
    <div class="transfer-card">
        <form id="formulario-operacion">

            <div class="transfer-body">

                <div id="titulo-operacion" xlu-include-file="templates/operation-title.html"></div>

                <div class="transfer-flex-row" id="field-nombre" xlu-include-file="templates/field-template.html"></div>

                <div class="transfer-flex-row" id="field-iban" xlu-include-file="templates/field-template.html"></div>

                <div class="transfer-flex-row" id="field-importe" xlu-include-file="templates/field-template.html"></div>

                <div class="transfer-flex-row" id="field-concepto" xlu-include-file="templates/field-template.html"></div>

            </div>

            <div class="transfer-footer">
                <div class="footer-left">
                    <div id="btn-borrar" xlu-include-file="templates/button.html"></div>
                </div>

                <div class="footer-right">
                    <div id="btn-cancelar" xlu-include-file="templates/button.html"></div>
                    <div id="btn-accion" xlu-include-file="templates/button.html"></div>
                </div>
            </div>

        </form>
    </div>
</main>

<div xlu-include-file="templates/footer.html"></div>

<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", xLuIncludeFile);
</script>

</body>
</html>
