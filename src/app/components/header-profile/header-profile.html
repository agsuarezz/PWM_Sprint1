<header class="header-profile">
  <div class="header-profile__left">
    <a [routerLink]="logo_link" class="header-profile__logo-link">
      <img [src]="logo_src" [alt]="logo_alt" class="header-profile__logo">
    </a>

    <div class="header-profile__user-info">
      <span class="header-profile__username">{{ username }}</span>
      <span class="header-profile__account">{{ accountnumber }}</span>
    </div>
  </div>

  <div class="header-profile__right">
    <a [routerLink]="profilelink" class="header-profile__profile-link">
      <img [src]="profilesrc" [alt]="profilealt" class="header-profile__profile-icon">
    </a>
  </div>
</header>
