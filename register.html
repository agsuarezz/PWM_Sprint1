<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Banco Imperium</title>
    
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/register-style.css">
</head>
<body data-page="register">

    <div xlu-include-file="templates/header-profile.html"></div>

    <main class="register-container">
        <form id="register-form">
            <div xlu-include-file="templates/field-template.html" data-fieldid="name"></div>
            <div xlu-include-file="templates/field-template.html" data-fieldid="surname"></div>
            <div xlu-include-file="templates/field-template.html" data-fieldid="email"></div>
            <div xlu-include-file="templates/field-template.html" data-fieldid="phone"></div>
            <div xlu-include-file="templates/field-template.html" data-fieldid="birthdate"></div>

            <div class="form-row">
                <div xlu-include-file="templates/field-template.html" data-fieldid="address"></div>
                <div xlu-include-file="templates/field-template.html" data-fieldid="zip"></div>
            </div>

            <div class="form-row">
                <div xlu-include-file="templates/field-template.html" data-fieldid="password"></div>
                <div xlu-include-file="templates/field-template.html" data-fieldid="confirm-password"></div>
            </div>

            <div class="form-group">
                <label for="account-type">Tipo de cuenta</label>
                <select id="account-type" name="account-type" required>
                    <option value="">Selecciona la opción</option>
                    <option value="personal">Personal</option>
                    <option value="premium">Premium</option>
                    <option value="business">Negocios</option>
                </select>
            </div>

            <div xlu-include-file="templates/button-submit.html"></div>
        </form>
    </main>

    <div id="footer-container" xlu-include-file="templates/footer.html"></div>

    <script src="script.js"></script>
    <script src="register.js"></script>
<script>
        document.addEventListener("DOMContentLoaded", xLuIncludeFile);
    </script>
</body>
</html>
