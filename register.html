<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/shared.css">
    <link rel="stylesheet" href="styles/register-style.css">
    <link rel="stylesheet" href="styles/responsive-pages.css">
</head>
<body>

      <div xlu-include-file="templates/header-profile.html"
        data-username=""
        data-accountnumber=""

        data-profilesrc= "https://raw.githubusercontent.com/feathericons/feather/master/icons/arrow-right.svg"
        data-profilelink="index.html">
    </div>

    <main class="register-container">
        <form>
            <div xlu-include-file="templates/field-template.html" 
                 data-fieldid="name" 
                 data-labelname="Nombre" 
                 data-fieldtype="text" 
                 data-valtext=""
                 data-phtext="Ej: Laura"
                 data-validation="required pattern='[a-zA-ZÁ-Úá-úÑñ ]+' title='Solo se permiten letras'">
            </div>

            <div xlu-include-file="templates/field-template.html" 
                 data-fieldid="surname" 
                 data-labelname="Apellidos" 
                 data-fieldtype="text" 
                 data-valtext=""
                 data-phtext="Ej: Pérez García"
                 data-validation="required pattern='[a-zA-ZÁ-Úá-úÑñ ]+' title='Solo se permiten letras'">
            </div>

            <div xlu-include-file="templates/field-template.html" 
                 data-fieldid="email" 
                 data-labelname="Correo Electrónico" 
                 data-fieldtype="email" 
                 data-valtext=""
                 data-phtext="usuario@correo.com"
                 data-validation="required">
            </div>

            <div xlu-include-file="templates/field-template.html" 
                 data-fieldid="phone" 
                 data-labelname="Teléfono" 
                 data-fieldtype="tel" 
                 data-valtext=""
                 data-phtext="600 000 000"
                 data-validation="required pattern='[0-9]{9}' title='Debe introducir 9 dígitos'">
            </div>

            <div xlu-include-file="templates/field-template.html" 
                 data-fieldid="birthdate" 
                 data-labelname="Fecha de nacimiento" 
                 data-valtext=""
                 data-phtext="DD/MM/AAAA"
                 data-fieldtype="date"
                 data-validation="required">
            </div>

            <div class="form-row">
                <div xlu-include-file="templates/field-template.html" 
                     data-fieldid="address" 
                     data-labelname="Dirección" 
                     data-fieldtype="text" 
                     data-valtext=""
                     data-phtext="Calle, num, piso, letra"
                     data-validation="required">
                </div>
                <div xlu-include-file="templates/field-template.html" 
                     data-fieldid="zip" 
                     data-labelname="Código Postal" 
                     data-fieldtype="text" 
                     data-valtext=""
                     data-phtext="00000"
                     data-validation="required pattern='[0-9]{5}' title='Debe contener 5 números'">
                </div>
            </div>

            <div class="form-row">
                <div xlu-include-file="templates/field-template.html" 
                     data-fieldid="password" 
                     data-labelname="Contraseña" 
                     data-fieldtype="password" 
                     data-valtext=""
                     data-phtext="Crea una contraseña"
                     data-validation="required minlength='8' title='Mínimo 8 caracteres'">
                </div>
                <div xlu-include-file="templates/field-template.html" 
                     data-fieldid="confirm-password" 
                     data-labelname="Confirmar Contraseña" 
                     data-fieldtype="password" 
                     data-valtext=""
                     data-phtext="Repite la contraseña">
                </div>
            </div>

            <div class="form-group">
                <label for="account-type">Tipo de cuenta</label>
                <select id="account-type" name="account-type" required>
                    <option value="">Selecciona la opción</option>
                    <option value="personal">Personal</option>
                    <option value="premium">Premium</option>
                    <option value="business">Negocios</option>
                </select>
            </div>

            <div xlu-include-file="templates/button-submit.html" 
                 data-btnid="btn-register-submit" 
                 data-text="Completar Registro">
            </div>
        </form>
    </main>

    <div xlu-include-file="templates/footer.html"></div>

    <script src="script.js"></script>
    <script src="register.js"></script>
    <script>
        xLuIncludeFile().then(() => {
          document.dispatchEvent(new CustomEvent('templatesReady'));
        });
    </script>
</body>
</html>
