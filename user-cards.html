<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Banco Imperium - Tarjetas</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/shared.css">
  <link rel="stylesheet" href="styles/user-cards-style.css">
</head>

<body data-page="user-cards">

    <div id="user-header" xlu-include-file="templates/header-profile.html"></div>

  <main class="dashboard">

    <section class="dashboard__balance">
      <div id="user-balance" xlu-include-file="templates/balance-template.html"></div>
    </section>

    <hr class="dashboard__divider" />

    <section class="dashboard__actions">
      <div id="action-transfer" xlu-include-file="templates/action-user.html"></div>
      <div id="action-pay" xlu-include-file="templates/action-user.html"></div>
      <div id="action-topup" xlu-include-file="templates/action-user.html"></div>
    </section>

    <section class="dashboard__content">

      <div id="tabs-selection" xlu-include-file="templates/selection-cards.html"></div>

      <div class="cards-list">
        <div id="card-1" xlu-include-file="templates/card-info.html"></div>
        <div id="card-2" xlu-include-file="templates/card-info.html"></div>
        <div id="card-3" xlu-include-file="templates/card-info.html"></div>
      </div>

    </section>

  </main>

  <footer xlu-include-file="templates/footer.html"></footer>

  <script src="script.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", xLuIncludeFile);
  </script>

</body>
</html>
