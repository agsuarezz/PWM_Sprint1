<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Préstamos - Banco Imperium</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/loan-style.css">
    <link rel="stylesheet" href="styles/shared.css">
</head>
<body data-page="loans">

<header id="main-header" xlu-include-file="templates/header.html"></header>

<main class="simulator-main">

    <section class="simulator-wrapper">

        <h1 class="simulator-title">Simulador Imperium</h1>
        <p class="simulator-description">Calcule las condiciones de su financiación personalizada.</p>

        <form id="loan-form">
            <div id="field-amount" xlu-include-file="templates/field-template.html"></div>

            <div id="field-term" xlu-include-file="templates/field-template.html"></div>

            <div id="field-interest" xlu-include-file="templates/field-template.html"></div>

            <div class="form-action">
                <button type="button" class="btn-signup">
                    Calcular Cuota
                </button>
            </div>
        </form>

        <div id="loan-result" class="result-container">
            <span class="result-label">Mensualidad Estimada</span>
            <div class="result-value">
                0.00€
            </div>
        </div>

    </section>

</main>

<footer id="main-footer" xlu-include-file="templates/footer.html"></footer>

<script src="script.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", xLuIncludeFile);
</script>

</body>
</html>
